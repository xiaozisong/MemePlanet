name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging (Light Cloud)
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    environment: staging
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm build:backend

      - name: Build web
        run: pnpm build:web

      - name: Build & push Docker image
        run: |
          docker build -f Dockerfile.backend -t memestar-backend:${{ github.sha }} .
          echo "TODO: push to registry and SSH deploy to light cloud"
