          echo "TODO: run db migrations"
          echo "TODO: post-deploy health check"

  deploy-web:
    name: Deploy Web to Vercel / CF Pages
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    steps:
