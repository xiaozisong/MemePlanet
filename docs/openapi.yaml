              description: 我的评分（1-5），未评分为 null
            my_favorite:
              type: boolean
            published_at:
              type: string
              format: date-time
              nullable: true
            created_at:
              type: string
              format: date-time

    # ---------- Rating / Comment ----------
    RatingCreateRequest:
      type: object
      required: [star]
      properties:
        star:
          type: integer
          minimum: 1
          maximum: 5
        dimensions:
          type: object
          properties:
            laugh:
              type: integer
              minimum: 1
              maximum: 5
            creative:
              type: integer
              minimum: 1
              maximum: 5
            spread:
              type: integer
              minimum: 1
              maximum: 5
        is_god_trash_vote:
          type: boolean
          description: 二元判定（神/烂梗）
        comment:
          type: string
          maxLength: 200

    Rating:
      type: object
      description: 对齐 ratings 表
      properties:
        score_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_nickname:
          type: string
        user_avatar_url:
          type: string
          nullable: true
        star:
          type: integer
        is_judge:
          type: boolean
        is_god_trash_vote:
          type: boolean
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    RatingResult:
      type: object
      properties:
        score_id:
          type: string
          format: uuid
        meme_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        star:
          type: integer
        is_judge:
          type: boolean
        weight:
          type: number
          format: float
        meme_score_avg:
          type: number
          format: float
        meme_score_count:
          type: integer
        god_trash_triggered:
          type: boolean
        created_at:
          type: string
          format: date-time

    CommentCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 500
        parent_id:
          type: string
          format: uuid
          nullable: true
        ref_meme_id:
          type: string
          format: uuid
          nullable: true
          description: 引用梗卡（造梗接龙）
        is_meme_card:
          type: boolean
          description: 评论本身是否为新梗卡

    Comment:
      type: object
      description: 对齐 comments 表
      properties:
        comment_id:
          type: string
          format: uuid
        meme_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
        like_count:
          type: integer
        is_god_comment:
          type: boolean
        status:
          type: string
          enum: [published, hidden, deleted]
        created_at:
          type: string
          format: date-time

    # ---------- Legion ----------
    LegionCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 12
        slogan:
          type: string
          maxLength: 140
        avatar_url:
          type: string
        theme_tags:
          type: array
          items:
            type: string
        join_mode:
          type: string
          enum: [public, approval]
          default: approval

    Legion:
      type: object
      description: 对齐 legions 表
      properties:
        legion_id:
          type: string
          format: uuid
        name:
          type: string
        slogan:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        theme_tags:
          type: array
          items:
            type: string
        leader_id:
          type: string
          format: uuid
        level:
          type: integer
        activity_score:
          type: integer
        member_count:
          type: integer
        member_cap:
          type: integer
        join_mode:
          type: string
          enum: [public, approval]
        badges:
          type: array
          items:
            type: string
        pk_wins:
          type: integer
        pk_losses:
          type: integer
        status:
          type: string
          enum: [active, frozen, dissolved]
        created_at:
          type: string
          format: date-time

    LegionDetail:
      allOf:
        - $ref: '#/components/schemas/Legion'
        - type: object
          properties:
            top_members:
              type: array
              items:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  nickname:
                    type: string
                  avatar_url:
                    type: string
                  contribution:
                    type: integer
                  role:
                    type: string
            today_report:
              type: object
              properties:
                new_members:
                  type: integer
                new_memes:
                  type: integer
                pk_progress:
                  type: string

    LegionJoinResult:
      type: object
      properties:
        membership_id:
          type: string
          format: uuid
        legion_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [leader, vice_leader, member]
        contribution:
          type: integer
        joined_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [joined, pending]

    # ---------- PK ----------
    PkCreateRequest:
      type: object
      required: [type, legion_a, theme, start_at, end_at]
      properties:
        type:
          type: string
          enum: [creation, vote, hotness]
        legion_a:
          type: string
          format: uuid
        legion_b:
          type: string
          format: uuid
          nullable: true
          description: 为空表示系统匹配
        theme:
          type: string
          maxLength: 140
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        is_official:
          type: boolean
          default: false

    PkMatch:
      type: object
      description: 对齐 pk_matches 表
      properties:
        pk_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [creation, vote, hotness]
        legion_a:
          type: object
          properties:
            legion_id:
              type: string
              format: uuid
            name:
              type: string
            avatar_url:
              type: string
        legion_b:
          type: object
          properties:
            legion_id:
              type: string
              format: uuid
            name:
              type: string
            avatar_url:
              type: string
        theme:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [idle, challenged, accepted, preparing, battling, judging, settled, archived]
        score_a:
          type: number
          format: float
        score_b:
          type: number
          format: float
        winner_id:
          type: string
          format: uuid
          nullable: true
        mvp_user_id:
          type: string
          format: uuid
          nullable: true
        is_official:
          type: boolean
        my_votes_today:
          type: integer

    PkVoteResult:
      type: object
      properties:
        vote_id:
          type: string
          format: uuid
        pk_id:
          type: string
          format: uuid
        legion_id:
          type: string
          format: uuid
        my_votes_today:
          type: integer
        votes_remaining_today:
          type: integer
        current_scores:
          type: object
          properties:
            legion_a:
              type: number
              format: float
            legion_b:
              type: number
              format: float
        voted_at:
          type: string
          format: date-time

    # ---------- Chat ----------
    MessageSendRequest:
      type: object
      required: [msg_type]
      properties:
        msg_type:
          type: string
          enum: [text, image, meme, voice, system]
        content:
          type: string
          nullable: true
        extra:
          type: object
          properties:
            ref_message_id:
              type: string
              format: uuid
              nullable: true
            mentions:
              type: array
              items:
                type: string
                format: uuid
            ref_meme_id:
              type: string
              format: uuid
              nullable: true

    Message:
      type: object
      description: 对齐 messages 表
      properties:
        message_id:
          type: string
          format: uuid
        room_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        sender_nickname:
          type: string
        sender_avatar_url:
          type: string
          nullable: true
        msg_type:
          type: string
          enum: [text, image, meme, voice, system]
        content:
          type: string
          nullable: true
        extra:
          type: object
        created_at:
          type: string
          format: date-time

    # ---------- Pro / Order ----------
    ProSubscribeRequest:
      type: object
      required: [plan, channel]
      properties:
        plan:
          type: string
          enum: [monthly, yearly]
        auto_renew:
          type: boolean
          default: true
        channel:
          type: string
          enum: [wechat, alipay, apple]

    OrderCreated:
      type: object
      description: 对齐 orders 表
      properties:
        order_id:
          type: string
          format: uuid
        sub_id:
          type: string
          format: uuid
          nullable: true
        product_type:
          type: string
          enum: [pro, video_pkg]
        amount_cents:
          type: integer
          example: 1800
        channel:
          type: string
        status:
          type: string
          enum: [pending, paid, failed, refunded]
        wx_pay_params:
          type: object
          nullable: true
          description: 微信支付拉起参数（appid/timestamp/noncestr/package/sign_type/pay_sign）
        created_at:
          type: string
          format: date-time

    # ---------- Notification ----------
    Notification:
      type: object
      description: 对齐 notifications 表
      properties:
        notif_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [rating, god_meme, pk, reward, violation, pro, agent_done, comment, follow]
        title:
          type: string
        body:
          type: string
        payload:
          type: object
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
