                  uptime:
                    type: integer


components:
  # ============================================================
  # Security
  # ============================================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer Token。Header 格式：`Authorization: Bearer <access_token>`。
        access_token 有效期 2h，refresh_token 30d。

  # ============================================================
  # Parameters
  # ============================================================
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: 写操作幂等键，24h 内相同 key 返回首次响应。
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ============================================================
  # Responses
  # ============================================================
  responses:
    Unauthorized:
      description: 未认证 / token 失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          examples:
            invalid:
              value: { code: 1001, data: null, message: "token 无效", request_id: "..." }
            expired:
              value: { code: 1002, data: null, message: "token 过期", request_id: "..." }
    Forbidden:
      description: 无权限
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          examples:
            forbidden:
              value: { code: 1003, data: null, message: "无权限", request_id: "..." }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          examples:
            not_found:
              value: { code: 3001, data: null, message: "资源不存在", request_id: "..." }
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          examples:
            bad:
              value: { code: 9004, data: null, message: "参数校验失败", request_id: "..." }
    RateLimited:
      description: 限流
      headers:
        Retry-After:
          schema:
            type: integer
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          examples:
            rate:
              value: { code: 9003, data: null, message: "请求过于频繁", request_id: "..." }

  # ============================================================
  # Schemas
  # ============================================================
  schemas:
    # ---------- 统一包装 ----------
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 0=成功，非 0=业务错误码
          example: 0
        data:
          description: 业务数据，错误时为 null
        message:
          type: string
          example: ok
        request_id:
          type: string
          description: 32 位 ULID，链路追踪
          example: 01HQK8X9J2RT7N1V4Y6Z3B5M6P

    Paged:
      type: object
      required: [list, total, page, page_size, has_more]
      properties:
        list:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
        request_id:
          type: string

    # ---------- Auth ----------
    SmsSendRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: E.164 格式，含国家码
          example: "+8613800000000"
        scene:
          type: string
          enum: [login, bind, reset]
          default: login

    SmsSendResponse:
      type: object
      properties:
        sent:
          type: boolean
          example: true
        expire_in:
          type: integer
          description: 验证码有效期（秒）
          example: 300
        next_send_in:
          type: integer
          description: 下次可发送间隔（秒）
          example: 60

    SmsLoginRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
        device_id:
          type: string
          description: 设备指纹，用于风控

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          format: uuid

    AuthToken:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          format: uuid
        expires_in:
          type: integer
          example: 7200
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserSummary'

    # ---------- User ----------
    UserSummary:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
          nullable: true
        level:
          type: integer
        meme_power:
          type: integer
        is_pro:
          type: boolean
        is_new_user:
          type: boolean
        need_interest_tags:
          type: boolean

    UserProfile:
      type: object
      description: 当前用户资料，对齐 users + user_profiles 表
      properties:
        user_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
          nullable: true
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthday:
          type: string
          format: date
          nullable: true
        bio:
          type: string
          nullable: true
        level:
          type: integer
        meme_power:
          type: integer
          description: 梗力值
        defense_value:
          type: integer
          description: 破防值
        energy_balance:
          type: integer
          description: 梗能量余额
        legion_count:
          type: integer
          description: 已加入军团数（≤3）
        is_pro:
          type: boolean
        interest_tags:
          type: array
          items:
            type: string
        badges:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, banned, teen_mode, deleted]
        last_login_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          maxLength: 32
        avatar_url:
          type: string
          maxLength: 512
        gender:
          type: string
          enum: [male, female, other, unknown]
        bio:
          type: string
          maxLength: 140
        birthday:
          type: string
          format: date

    UserHome:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        level:
          type: integer
        meme_power:
          type: integer
        defense_value:
          type: integer
        is_pro:
          type: boolean
        is_following:
          type: boolean
        legion_ids:
          type: array
          items:
            type: string
            format: uuid
        stats:
          type: object
          properties:
            meme_count:
              type: integer
            god_meme_count:
              type: integer
            avg_score:
              type: number
              format: float
            pk_wins:
              type: integer
        badges:
          type: array
          items:
            type: string

    MemePower:
      type: object
      description: 梗力值 & 能量概览
      properties:
        user_id:
          type: string
          format: uuid
        meme_power:
          type: integer
        level:
          type: integer
        defense_value:
          type: integer
        energy_balance:
          type: integer
        max_energy:
          type: integer
        level_progress:
          type: object
          properties:
            current_level:
              type: integer
            current_label:
              type: string
            current_meme_power:
              type: integer
            next_level:
              type: integer
              nullable: true
            next_label:
              type: string
              nullable: true
            meme_power_needed:
              type: integer
              description: 到下一级还需 x 梗力值
            progress_percent:
              type: number
              format: float
              description: 本等级进度百分比 0-100

    LevelDetail:
      type: object
      description: 等级详情（含下一等级进度），满级时 next 字段为 null
      properties:
        user_id:
          type: string
          format: uuid
        current_level:
          type: integer
        current_label:
          type: string
        meme_power:
          type: integer
        next:
          type: object
          nullable: true
          properties:
            level:
              type: integer
            label:
              type: string
            meme_power_needed:
              type: integer
            progress_percent:
              type: number
              format: float
        max_level:
          type: boolean
          description: 是否已满级

    # ---------- Creation ----------
    CreationSingleRequest:
      type: object
      required: [mode, prompt]
      properties:
        mode:
          type: string
          enum: [text, image]
        prompt:
          type: string
          maxLength: 500
        style:
          type: string
          description: text=abstract/yin_yang/pun/twist/meme_caption；image=realistic/anime/expression_pack/oil_paint
        template_id:
          type: string
          format: uuid
          nullable: true
        regenerate_from:
          type: string
          format: uuid
          nullable: true
          description: 基于 creation_id 重新生成

    CreationResult:
      type: object
      properties:
        creation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, ready, published, failed]
        mode:
          type: string
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CreationCandidate'
        energy_cost:
          type: integer
        model_version:
          type: string
          example: deepseek-v3
        cached:
          type: boolean
          description: 是否命中 Redis prompt 缓存

    CreationCandidate:
      type: object
      properties:
        candidate_id:
          type: string
          format: uuid
        idx:
          type: integer
        content:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        self_score:
          type: number
          format: float
          nullable: true

    # ---------- Prompt Templates ----------
    PromptTemplateSummary:
      type: object
      description: 模板列表摘要（不含 prompt 正文）
      properties:
        template_id:
          type: string
          format: uuid
        mode:
          type: string
          enum: [text, image, script]
        name:
          type: string
        style:
          type: string
          nullable: true
        variables:
          type: array
          items:
            type: string
          description: 模板声明的变量名列表
        is_official:
          type: boolean
        use_count:
          type: integer
        status:
          type: string
        created_at:
          type: string
          format: date-time

    PromptTemplateDetail:
      type: object
      description: 模板完整详情（含 prompt 正文）
      allOf:
        - $ref: '#/components/schemas/PromptTemplateSummary'
        - type: object
          properties:
            system_prompt:
              type: string
              description: 系统提示词（给 AI 的行为指令）
            user_template:
              type: string
              description: 用户模板（含 {{varName}} 占位）
            example_output:
              type: object
              nullable: true
              description: 示例输出
            creator_id:
              type: string
              format: uuid
              nullable: true

    PromptTemplateRenderResult:
      type: object
      description: 模板渲染结果
      properties:
        template_id:
          type: string
          format: uuid
        mode:
          type: string
        name:
          type: string
        system_prompt:
          type: string
        rendered_user_template:
          type: string
          description: 变量插值后的用户提示词
        style:
          type: string
          nullable: true
          description: Agent 自评分（仅 agent 模式）
        self_reason:
          type: string
          nullable: true

    AgentSubmitRequest:
      type: object
      required: [mode, prompt]
      properties:
        mode:
          type: string
          enum: [text]
        prompt:
          type: string
          maxLength: 500
        style:
          type: string
        template_id:
          type: string
          format: uuid
          nullable: true

    AgentJobAck:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        creation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
        poll_url:
          type: string
          example: /api/v1/agent-jobs/uuid-job-1
        estimated_seconds:
          type: integer
          example: 25

    AgentJob:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        creation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed, timeout]
        steps_total:
          type: integer
          example: 3
        steps_done:
          type: integer
        fallback_used:
          type: boolean
          description: true=已降级为单次 prompt 模式
        cost_estimate:
          type: number
          format: float
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CreationCandidate'
        chosen_idx:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true

    PromptTemplate:
      type: object
      description: 对齐 prompt_templates 表
      properties:
        template_id:
          type: string
          format: uuid
        mode:
          type: string
          enum: [text, image, script]
        name:
          type: string
        style:
          type: string
        is_official:
          type: boolean
        use_count:
          type: integer
        variables:
          type: array
          items:
            type: string
        example_output:
          type: object

    # ---------- Video ----------
    VideoSubmitRequest:
      type: object
      required: [source_type, duration]
      properties:
        creation_id:
          type: string
          format: uuid
          nullable: true
        source_type:
          type: string
          enum: [text_to_video, image_to_video, fallback_image_tts]
        duration:
          type: integer
          enum: [5, 10, 15]
        voice_id:
          type: string
          enum: [funny, northeast, queen, robot]
        subtitle_text:
          type: string

    VideoJobAck:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
        poll_url:
          type: string
        is_fallback:
          type: boolean
        estimated_seconds:
          type: integer

    VideoStatus:
      type: object
      description: 对齐 meme_videos 表
      properties:
        video_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [generating, reviewing, published, rejected, timeout]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        is_fallback:
          type: boolean
        model_version:
          type: string
          example: seedance-2-mini
        file_url:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        duration:
          type: integer
        voice_id:
          type: string
          nullable: true
        subtitle_text:
          type: string
          nullable: true
        ai_cost:
          type: number
          format: float
        error:
          type: string
          nullable: true

    # ---------- Meme ----------
    MemePublishRequest:
      type: object
      required: [type, title, is_ai_generated]
      properties:
        creation_id:
          type: string
          format: uuid
          nullable: true
        video_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [text, image, video]
        title:
          type: string
          maxLength: 140
        tags:
          type: array
          items:
            type: string
          maxItems: 5
        legion_id:
          type: string
          format: uuid
          nullable: true
        cover_url:
          type: string
          nullable: true
        is_ai_generated:
          type: boolean

    MemeCard:
      type: object
      description: 对齐 meme_cards 表
      properties:
        meme_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        creation_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [text, image, video]
        cover_url:
          type: string
          nullable: true
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        legion_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [draft, pending_audit, published, manual_review, rejected, offline]
        god_trash_status:
          type: string
          enum: [pending, god, trash]
        is_ai_generated:
          type: boolean
        watermarked:
          type: boolean
        created_at:
          type: string
          format: date-time

    MemeCardSummary:
      type: object
      description: feed 列表项
      properties:
        meme_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        author_nickname:
          type: string
        author_avatar_url:
          type: string
          nullable: true
        type:
          type: string
          enum: [text, image, video]
        cover_url:
          type: string
          nullable: true
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        legion_id:
          type: string
          format: uuid
          nullable: true
        score_avg:
          type: number
          format: float
        score_count:
          type: integer
        comment_count:
          type: integer
        share_count:
          type: integer
        hot_score:
          type: number
          format: float
        god_trash_status:
          type: string
          enum: [pending, god, trash]
        is_ai_generated:
          type: boolean
        published_at:
          type: string
          format: date-time

    MemeDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemeCardSummary'
        - type: object
          properties:
            author:
              $ref: '#/components/schemas/UserSummary'
            legion:
              type: object
              nullable: true
              properties:
                legion_id:
                  type: string
                  format: uuid
                name:
                  type: string
                avatar_url:
                  type: string
            favorite_count:
              type: integer
            view_count:
              type: integer
            completion_rate:
              type: number
              format: float
            video:
              $ref: '#/components/schemas/VideoStatus'
              nullable: true
            my_rating:
              type: integer
