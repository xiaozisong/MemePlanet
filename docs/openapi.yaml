          in: query
          schema:
            type: string
            default: "-like_count,-created_at"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Comment'

  # ============================================================
  # Legion
  # ============================================================
  /legions:
    post:
      tags: [Legion]
      summary: 创建军团
      description: |
        - 创建者需 Lv.3+
        - 名称唯一（citext 不区分大小写），3-12 字，禁止敏感词与冒充官方
        - 创建时人审（status=active 但创建后排队人审，违规可 retro-ban）
        - 创建者自动成为 leader 并占用一个军团名额（≤3）
      operationId: createLegion
      x-memestar-version: M2
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegionCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Legion'
        '403':
          description: 等级不足 / 军团数上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                max_joined:
                  value: { code: 5003, data: null, message: "已加入军团上限", request_id: "..." }
        '409':
          description: 名称重复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                dup:
                  value: { code: 5001, data: null, message: "军团名重复", request_id: "..." }
    get:
      tags: [Legion]
      summary: 军团广场列表
      operationId: listLegions
      x-memestar-version: M2
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: filter
          in: query
          schema:
            type: string
          description: "如 theme_tags:contains:抽象"
        - name: sort
          in: query
          schema:
            type: string
            default: "-activity_score"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Legion'

  /legions/{id}:
    get:
      tags: [Legion]
      summary: 军团详情
      description: 含基础字段 + 成员榜 Top10 + 今日战报 + PK 战绩摘要。
      operationId: getLegion
      x-memestar-version: M2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LegionDetail'

  /legions/{id}/join:
    post:
      tags: [Legion]
      summary: 加入军团
      description: |
        - join_mode=public 立即加入
        - join_mode=approval 创建 join_request，等待队长审批（status=pending）
        - 用户已加入军团数 ≤ 3
      operationId: joinLegion
      x-memestar-version: M2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 100
      responses:
        '200':
          description: 加入成功 / 待审批
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LegionJoinResult'
        '403':
          description: 已加入军团上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                max_joined:
                  value: { code: 5003, data: null, message: "已加入军团上限", request_id: "..." }

  # ============================================================
  # PK
  # ============================================================
  /pk/matches:
    get:
      tags: [PK]
      summary: PK 大厅列表
      operationId: listPkMatches
      x-memestar-version: M2
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [idle, challenged, accepted, preparing, battling, judging, settled, archived]
        - name: type
          in: query
          schema:
            type: string
            enum: [creation, vote, hotness]
        - name: is_official
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/PkMatch'
    post:
      tags: [PK]
      summary: 创建 PK（约战/官方）
      description: |
        - 鉴权：leader 或运营
        - legion_b 可为空（系统匹配，进入 challenged）
        - 跨段位保护：低 2 段以上不可挑战
        - 单军团同时最多 1 场进行中 PK
      operationId: createPkMatch
      x-memestar-version: M2
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PkCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PkMatch'
        '409':
          description: PK 状态非法 / 跨段位
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                status:
                  value: { code: 5101, data: null, message: "已有进行中 PK", request_id: "..." }

  /pk/matches/{id}/vote:
    post:
      tags: [PK]
      summary: 投票
      description: |
        - 3 票/日/PK/用户
        - Redis 实时计数 + DB 异步落盘
        - 实时比分通过 Redis pubsub → WebSocket 推送
      operationId: votePk
      x-memestar-version: M2
      x-memestar-rate-limit: 3/day/pk/user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [legion_id]
              properties:
                legion_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: 投票成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PkVoteResult'
        '429':
          description: 票数耗尽
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                out:
                  value: { code: 5102, data: null, message: "今日投票次数已用尽", request_id: "..." }
        '409':
          description: PK 状态非 battling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                status:
                  value: { code: 5101, data: null, message: "PK 不在 battling 状态", request_id: "..." }

  # ============================================================
  # Chat
  # ============================================================
  /chat/rooms/{id}/messages:
    get:
      tags: [Chat]
      summary: 消息列表
      description: 游标分页，30 天前数据归档不可查。
      operationId: listMessages
      x-memestar-version: M2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Message'
                              next_cursor:
                                type: string
                                nullable: true
    post:
      tags: [Chat]
      summary: 发送消息
      description: |
        - msg_type: text/image/meme/voice/system
        - extra 支持 ref_message_id（引用）、mentions（@）、ref_meme_id（梗卡分享）
        - 新成员前 24h 限 3 条/min
      operationId: sendMessage
      x-memestar-version: M2
      x-memestar-rate-limit: new 3/min, old 30/min
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageSendRequest'
      responses:
        '201':
          description: 发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Message'

  # ============================================================
  # Recommend
  # ============================================================
  /recommend/feed:
    get:
      tags: [Recommend]
      summary: 个性化 feed
      description: |
        鉴权为是（登录后）。M2 起走双塔召回 + LightGBM 排序。
        /memes/feed 的个性化版本。
      operationId: getRecommendFeed
      x-memestar-version: M2
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/MemeCardSummary'
                              next_cursor:
                                type: string
                                nullable: true

  # ============================================================
  # Pro / Order
  # ============================================================
  /pro/subscriptions:
    post:
      tags: [Pro]
      summary: 订阅 Pro
      description: 创建订单 + 拉起微信支付。月费 ¥18（1800 分）。
      operationId: subscribePro
      x-memestar-version: M2
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProSubscribeRequest'
      responses:
        '201':
          description: 订单创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderCreated'
        '409':
          description: 已订阅
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                already:
                  value: { code: 7003, data: null, message: "Pro 已订阅且未过期", request_id: "..." }

  /orders/wx-pay/callback:
    post:
      tags: [Pro]
      summary: 微信支付回调
      description: |
        微信支付 v3 规范回调。
        - 路径前缀 /api/internal/webhooks/orders/wx-pay（不走红框包装）
        - 验签：平台证书 RSA-SHA256 + timestamp 防重放
        - 解密：AES-256-GCM resource.ciphertext
        - 业务：更新 orders/payments/pro_subscriptions/video_packages
        - 响应 200 + {"code":"SUCCESS","message":"OK"}（微信规范）
        - 幂等：(order_id, channel_txn_id) 唯一约束防重
        - 重试：微信按 15s/15s/30s/3m/10m/20m/30m/30m/1h/2h/6h/6h 重试 12 次
      operationId: wxPayCallback
      security: []
      x-memestar-version: M2
      x-memestar-auth: HMAC-SHA256 + RSA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 微信支付 v3 回调格式（含 resource.ciphertext 加密体）
      responses:
        '200':
          description: 处理成功（微信规范）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
                    example: OK

