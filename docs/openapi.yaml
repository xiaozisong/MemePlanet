        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Rating
  # ============================================================
  /memes/{id}/ratings:
    post:
      tags: [Rating]
      summary: 评分（1-5 星）
      description: |
        一人一梗一评，24h 内可改分（走 PATCH /ratings/{id}）。
        - 评分权重：评审官 1.5x、新用户 0.5x、同军团 0.8x、普通 1.0x
        - 达 200 评分触发神/烂梗判定 job
        - 青少年模式不可评分
      operationId: createRating
      x-memestar-version: M1
      x-memestar-rate-limit: 60/min/user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingCreateRequest'
      responses:
        '200':
          description: 评分成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RatingResult'
        '409':
          description: 已评分过
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                already:
                  value: { code: 4001, data: null, message: "已评分过", request_id: "..." }
    get:
      tags: [Rating]
      summary: 评分列表
      operationId: listRatings
      x-memestar-version: M1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: sort
          in: query
          schema:
            type: string
            default: "-created_at"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Rating'

  /memes/{id}/comments:
    post:
      tags: [Rating]
      summary: 评论 / 回复
      description: 走敏感词 DFA + 可疑走阿里云。parent_id 楼中楼（≤3 层）。
      operationId: createComment
      x-memestar-version: M1
      x-memestar-rate-limit: 30/min/user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
