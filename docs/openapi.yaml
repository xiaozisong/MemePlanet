openapi: 3.1.0
info:
  title: 梗星球 MemeChatAI REST API
  version: 1.0.0
  description: |
    梗星球（MemeChatAI）REST API 接口契约，OpenAPI 3.1.0 机器可读版本。

    - 字段命名严格对齐 `db/schema.sql` v1.0.0（snake_case）。
    - 统一响应包装 `{code, data, message, request_id}`。
    - 鉴权：JWT Bearer（除标注为无需鉴权的接口）。
    - 异步 AI 任务：202 + job_id + 轮询/WebSocket。
    - M1 P0 接口对应 M1 Sprint（2026-07-08 ~ 2026-08-04）必交付范围；
      M2 接口对应第 2 个月交付；v1.5+ 接口在表格中列出但本文件给最小 schema。
    - 人类可读详设见 `docs/API-Spec.md`。
  contact:
    name: 后端架构 / API 设计
  license:
    name: Proprietary
  x-memestar-doc-version: v1.0.0
  x-memestar-related:
    prd: docs/PRD.md v1.1.0
    tech: docs/TechnicalDesign.md v1.1.0
    m1-plan: docs/M1-Sprint-Plan.md v1.0.0
    schema: docs/db/schema.sql v1.0.0

servers:
  - url: https://api.dev.memestar.cn/api/v1
    description: dev 本地开发联调
  - url: https://api.staging.memestar.cn/api/v1
    description: staging 灰度前联调 + 邀请制灰度
  - url: https://api.memestar.cn/api/v1
    description: prod 生产（ICP 备案后启用）

tags:
  - name: Auth
    description: 认证 / 授权
  - name: User
    description: 用户资料 / 等级 / 兴趣 / 勋章
  - name: Creation
    description: 造梗工坊（单次 prompt / Pro Agent）
  - name: Video
    description: AI 视频生成
  - name: Meme
    description: 梗卡内容流
  - name: Rating
    description: 评分与评论
  - name: Legion
    description: 梗大军
  - name: PK
    description: PK 大战
  - name: Chat
    description: 聊天 / IM
  - name: Recommend
    description: 推荐 feed
  - name: Notification
    description: 通知
  - name: Pro
    description: Pro 会员 / 订单 / 支付
  - name: Admin
    description: 运营后台
  - name: AIOrch
    description: AI 编排（内部 + 管理员）
  - name: Analytics
    description: 埋点上报
  - name: Common
    description: 公共接口

security:
  - BearerAuth: []

paths:
  # ============================================================
  # Auth
  # ============================================================
  /auth/sms/send:
    post:
      tags: [Auth]
      summary: 发送手机号验证码
      description: |
        向指定手机号发送 6 位数字验证码，60s 内不可重发。
        验证码存 Redis（key=`otp:{phone}`，TTL=5min），登录时校验。
      operationId: sendSmsCode
      security: []
      x-memestar-version: M1
      x-memestar-rate-limit: 1/60s/phone, 10/day/phone, 5/15min/IP
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsSendRequest'
            examples:
              default:
                value: { phone: "+8613800000000", scene: "login" }
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SmsSendResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/sms/login:
    post:
      tags: [Auth]
      summary: 手机号验证码登录（新用户自动注册）
      operationId: smsLogin
      security: []
      x-memestar-version: M1
      x-memestar-rate-limit: 5/15min/IP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsLoginRequest'
            examples:
              default:
                value:
                  phone: "+8613800000000"
                  code: "123456"
                  device_id: "canvas-hash-xxx"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthToken'
        '400':
          description: 验证码错误或过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                wrong_code:
                  value: { code: 1013, data: null, message: "验证码错误", request_id: "..." }
                expired:
                  value: { code: 1014, data: null, message: "验证码已过期", request_id: "..." }
        '403':
          description: 用户被封禁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                banned:
                  value: { code: 2004, data: null, message: "用户已被封禁", request_id: "..." }
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 access_token
      description: 用 refresh_token 换新的 access_token + refresh_token，旧 refresh 即时失效。
      operationId: refreshToken
      security: []
      x-memestar-version: M1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      description: 撤销当前 refresh_token 并将 access_token 加入 Redis 黑名单。
      operationId: logout
      x-memestar-version: M1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  format: uuid
      responses:
        '204':
          description: 退出成功（无返回体）
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: 当前登录态校验
      operationId: getAuthMe
      x-memestar-version: M1
      responses:
        '200':
          description: 登录态有效
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserSummary'
                          expires_at:
                            type: string
                            format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # User
  # ============================================================
  /users/me:
    get:
      tags: [User]
      summary: 我的资料
      description: 返回当前登录用户的完整资料，含 level/meme_power/energy_balance 等。
      operationId: getMe
      x-memestar-version: M1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [User]
      summary: 编辑资料
      description: |
        部分字段可选更新。昵称 30 天改 1 次（由 user_profiles.nickname_changed_at 控制）。
        昵称走敏感词 DFA + 阿里云审核。
      operationId: updateMe
      x-memestar-version: M1
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          description: 昵称违规或未到改昵称时间
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}:
    get:
      tags: [User]
      summary: 用户主页
      operationId: getUserHome
      x-memestar-version: M1
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserHome'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                not_found:
                  value: { code: 2001, data: null, message: "用户不存在", request_id: "..." }

  /users/me/power:
    get:
      tags: [User]
      summary: 我的梗力值/能量概览
      description: |
        返回当前登录用户的梗力值、等级、破防值、能量余额、能量上限及等级进度。
        用于客户端首页/造梗页的能量条与等级展示。
      operationId: getMyMemePower
      x-memestar-version: M1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MemePower'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/level:
    get:
      tags: [User]
      summary: 我的等级详情（含下一等级进度）
      description: |
        返回当前用户的等级详情：当前等级、当前等级标签、梗力值、
        到下一等级所需差值与百分比进度。满级时 next 为 null。
      operationId: getMyLevelDetail
      x-memestar-version: M1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LevelDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # Creation
  # ============================================================
  /creations/single:
    post:
      tags: [Creation]
      summary: 单次 prompt 造梗（文本/图片）
      description: |
        同步返回 3 候选（文本）或 1 候选（图片）。
        - 超时 35s
        - 能量扣减：文本 1，图片 5（乐观锁）
        - 24h prompt+style 去重，命中返回原 creation_id（code=6005）
        - prompt 命中黑名单返回 code=6002
      operationId: createSingle
      x-memestar-version: M1
      x-memestar-rate-limit: 60/hour/user
      x-memestar-timeout: 35s
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationSingleRequest'
            examples:
              text:
                value:
                  mode: "text"
                  prompt: "如果古代人有微信"
                  style: "abstract"
                  template_id: "uuid-template-1"
              image:
                value:
                  mode: "image"
                  prompt: "李白在朋友圈晒月亮"
                  style: "anime"
      responses:
        '200':
          description: 生成成功（同步）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreationResult'
        '400':
          description: 参数错误 / 能量不足 / prompt 重复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                energy_low:
                  value: { code: 6001, data: null, message: "能量不足", request_id: "..." }
                prompt_blacklist:
                  value: { code: 6002, data: null, message: "prompt 命中黑名单", request_id: "..." }
                prompt_dup:
                  value: { code: 6005, data: { creation_id: "uuid-old", cached: true }, message: "24h 内已生成", request_id: "..." }
        '429':
          $ref: '#/components/responses/RateLimited'

  /creations/agent:
    post:
      tags: [Creation]
      summary: Pro Agent 造梗提交（异步）
      description: |
        Pro 会员专属。3 步精简版：RAG 检索神梗 → 生成 3 候选 → 自评选优。
        - 异步任务，返回 202 + job_id
        - 限流 10 次/日/Pro 用户（硬配额）+ 日预算 ¥80 熔断
        - 失败/超时自动降级为单次 prompt 模式，退回 Agent 能量
      operationId: submitAgent
      x-memestar-version: M2
      x-memestar-rate-limit: 10/day/pro_user
      x-memestar-async: true
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSubmitRequest'
      responses:
        '202':
          description: 已接受
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentJobAck'
        '403':
          description: 非 Pro 用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                not_pro:
                  value: { code: 1003, data: null, message: "Pro 会员专属功能", request_id: "..." }
        '429':
          description: 配额耗尽 / 熔断
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                quota_out:
                  value: { code: 6004, data: null, message: "Agent 日配额耗尽", request_id: "..." }
                budget_burn:
                  value: { code: 6003, data: null, message: "日预算熔断，已自动降级", request_id: "..." }

  /agent-jobs/{id}:
    get:
      tags: [Creation]
      summary: Agent 任务状态查询（轮询）
      description: |
        客户端每 2s 轮询一次，最长 60s 后切 WebSocket 推送。
        status 状态机：queued → running → succeeded / failed / timeout。
        fallback_used=true 表示已降级为单次 prompt 模式。
      operationId: getAgentJob
      x-memestar-version: M2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 任务状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /prompt-templates:
    get:
      tags: [Creation]
      summary: Prompt 模板库
      description: 官方 5 个 + UGC（v1.5+）。支持 mode/style/is_official 过滤。
      operationId: listPromptTemplates
      x-memestar-version: M1
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [text, image, script]
        - name: style
          in: query
          schema:
            type: string
        - name: is_official
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/PromptTemplate'

  /prompt-templates/{id}:
    get:
      tags: [PromptTemplates]
      summary: 获取单个 Prompt 模板详情（含完整 prompt 内容）
      operationId: getPromptTemplateById
      x-memestar-version: M1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PromptTemplateDetail'

  /prompt-templates/{id}/render:
    post:
      tags: [PromptTemplates]
      summary: 渲染 Prompt 模板
      description: |
        传入变量键值对，将模板内的 {{varName}} 占位替换为实际值，
        并自增 use_count。
      operationId: renderPromptTemplate
      x-memestar-version: M1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variables]
              properties:
                variables:
                  type: object
                  description: 变量名 → 变量值映射
                  additionalProperties:
                    type: string
                  example:
                    keyword: 上班
                    style: 搞笑
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PromptTemplateRenderResult'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Video
  # ============================================================
  /videos:
    post:
      tags: [Video]
      summary: 视频生成提交（异步）
      description: |
        异步任务，返回 202 + job_id。
        - 配额：免费 1 次/周（需任务解锁）/ Pro 3 次/日
        - 模型：豆包 Seedance 2.0 mini（主力）/ 标准版（Pro 高端）/ SiliconFlow fallback / 图片+TTS 兜底
        - 时长：5 / 10 / 15 秒
        - 日预算熔断：超 ¥100 自动降级到图片+TTS，超 ¥200 暂停真视频
      operationId: submitVideo
      x-memestar-version: M2
      x-memestar-rate-limit: free 1/week, pro 3/day
      x-memestar-async: true
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoSubmitRequest'
      responses:
        '202':
          description: 已接受
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VideoJobAck'
        '400':
          description: 能量不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                energy_low:
                  value: { code: 6001, data: null, message: "能量不足", request_id: "..." }
        '429':
          description: 配额耗尽 / 熔断
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                quota_out:
                  value: { code: 3102, data: null, message: "视频配额耗尽", request_id: "..." }

  /videos/{id}/status:
    get:
      tags: [Video]
      summary: 视频生成状态查询
      description: |
        客户端每 3s 轮询，最长 180s 后切 Webhook 推送。
        status：generating / reviewing / published / rejected / timeout。
        is_fallback=true 表示已降级为图片+TTS+Ken Burns 兜底。
      operationId: getVideoStatus
      x-memestar-version: M2
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VideoStatus'

  # ============================================================
  # Meme
  # ============================================================
  /memes:
    post:
      tags: [Meme]
      summary: 发布梗卡
      description: |
        从造梗会话/视频包装为梗卡，入审核队列。
        - status 流转：draft → pending_audit → published / manual_review / rejected / offline
        - AI 生成内容强制带 watermarked=true 与 is_ai_generated=true（合规）
      operationId: publishMeme
      x-memestar-version: M1
      x-memestar-rate-limit: 30/hour/user
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemePublishRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MemeCard'
        '409':
          description: creation 已发布过
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                already:
                  value: { code: 3002, data: null, message: "creation 已发布过", request_id: "..." }

  /memes/feed:
    get:
      tags: [Meme, Recommend]
      summary: 推荐 feed（热度召回 v1）
      description: |
        游客可读。M1 走热度召回 v1（Redis ZSet + 新品 Top 混合 + 多样性重排）；
        M2 升级为双塔召回 + LightGBM 排序（走 /recommend/feed）。
        游标分页。
      operationId: getMemeFeed
      security: []
      x-memestar-version: M1
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: feed_type
          in: query
          schema:
            type: string
            enum: [hot, new, personalized, god]
            default: hot
        - name: legion_id
          in: query
          schema:
            type: string
            format: uuid
        - name: tag
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Paged'
                          - type: object
                            properties:
                              list:
                                type: array
                                items:
                                  $ref: '#/components/schemas/MemeCardSummary'
                              next_cursor:
                                type: string
                                nullable: true

  /memes/{id}:
    get:
      tags: [Meme]
      summary: 梗卡详情
      description: 游客可读 published 状态梗卡。返回完整字段含作者摘要、视频、我的评分/收藏。
      operationId: getMeme
      security: []
      x-memestar-version: M1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MemeDetail'
        '404':
          description: 梗卡不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                not_found:
                  value: { code: 3001, data: null, message: "梗卡不存在", request_id: "..." }
    delete:
      tags: [Meme]
      summary: 删除梗卡（软删除）
      description: 作者或管理员可删，软删除（deleted_at）。
      operationId: deleteMeme
      x-memestar-version: M1
      parameters:
        - name: id
          in: path
          required: true
          schema:
